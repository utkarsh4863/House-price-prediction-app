<!DOCTYPE html>
<html>

<head>

<title>House Price Prediction</title>

<link href=
"https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow p-4">

<h2 class="text-center mb-4">
House Price Prediction
</h2>


<form action="/predict" method="POST">

<div class="mb-3">

<label>
Location
</label>

<select class="form-select"
name="location"
required>

{% for location in locations %}

<option value="{{location}}">
{{location}}
</option>

{% endfor %}

</select>

</div>


<div class="mb-3">

<label>
Total Sqft
</label>

<input
type="number"
class="form-control"
name="sqft"
required>

</div>


<div class="mb-3">

<label>
Bathrooms
</label>

<input
type="number"
class="form-control"
name="bath"
required>

</div>


<div class="mb-3">

<label>
BHK
</label>

<input
type="number"
class="form-control"
name="bhk"
required>

</div>


<div class="d-grid">

<button
class="btn btn-primary">

Predict Price

</button>

</div>

</form>


{% if prediction_text %}

<div class="alert alert-success mt-4">

<h4>

{{prediction_text}}

</h4>

</div>

{% endif %}

</div>

</div>

</div>

</div>

</body>

</html>
